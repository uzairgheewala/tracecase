services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: tracecase_lab
      POSTGRES_USER: tracecase
      POSTGRES_PASSWORD: tracecase
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracecase -d tracecase_lab"]
      interval: 2s
      timeout: 2s
      retries: 30
    volumes:
      - lab-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7.4-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 30

  mock-sis:
    image: python:3.13-slim
    working_dir: /app
    command: ["python", "scripts/mock_sis.py"]
    volumes:
      - .:/app:ro
    environment:
      MOCK_SIS_PORT: "8020"
    ports:
      - "8020:8020"

  lab-api:
    build:
      context: ../..
      dockerfile: apps/reference-lab/Dockerfile
    command: ["sh", "-c", "python manage.py migrate && python manage.py runserver 0.0.0.0:8010"]
    environment: &lab-env
      DJANGO_SECRET_KEY: lab-only
      DATABASE_URL: postgresql://tracecase:tracecase@postgres:5432/tracecase_lab
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      MOCK_SIS_URL: http://mock-sis:8020
      TRACECASE_EVENT_LOG: /evidence/events.jsonl
      TRACECASE_LAB_FAULTS_ENABLED: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mock-sis:
        condition: service_started
    ports:
      - "8010:8010"
    volumes:
      - lab-evidence:/evidence

  lab-worker:
    build:
      context: ../..
      dockerfile: apps/reference-lab/Dockerfile
    command: ["celery", "-A", "config", "worker", "--loglevel=INFO", "--concurrency=2"]
    environment: *lab-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mock-sis:
        condition: service_started
    volumes:
      - lab-evidence:/evidence

volumes:
  lab-postgres:
  lab-evidence:
