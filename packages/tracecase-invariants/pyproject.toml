[project]
name = "tracecase-invariants"
version = "0.5.0"
requires-python = ">=3.11"
dependencies = [
  "pydantic>=2.8,<3",
  "tracecase-model>=0.3.0",
  "tracecase-graph>=0.3.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tracecase_invariants"]
