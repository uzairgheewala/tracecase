[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "tracecase-scenarios"
version = "0.5.0"
description = "Generic scenario universes, generation, and synthetic execution for Tracecase"
requires-python = ">=3.11"
dependencies = [
  "pydantic>=2.8,<3",
  "tracecase-model>=0.3.0",
]

[tool.setuptools.packages.find]
where = ["src"]
