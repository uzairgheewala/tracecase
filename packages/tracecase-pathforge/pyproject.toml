[project]
name = "tracecase-pathforge"
version = "0.5.0"
requires-python = ">=3.11"
dependencies = ["pydantic>=2.8,<3", "tracecase-model", "tracecase-sdk", "tracecase-graph", "tracecase-invariants", "tracecase-analyzers", "tracecase-compare"]

[build-system]
requires = ["setuptools>=75"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
